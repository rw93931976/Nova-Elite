version: '3.8'

services:
  nova-core:
    build: .
    container_name: nova-core
    restart: always
    env_file: .env
    environment:
      - SOVEREIGN_SECRET=sovereign-secret-12345
    volumes:
      - ./.env:/app/.env
    command: node core.cjs
    networks:
      - nova-bridge

  nova-relay:
    build: .
    container_name: nova-relay
    restart: always
    env_file: .env
    environment:
      - SOVEREIGN_SECRET=sovereign-secret-12345
    volumes:
      - ./.env:/app/.env
    command: node relay.cjs
    ports:
      - '3506:3511'
    networks:
      - nova-bridge

networks:
  nova-bridge:
    driver: bridge
