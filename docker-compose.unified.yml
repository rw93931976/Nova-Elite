version: '3.8'

services:
  nova-core:
    build: .
    container_name: nova-core
    restart: always
    env_file: .env
    environment:
      - SOVEREIGN_SECRET=sovereign-secret-12345
    volumes:
      - ./.env:/app/.env
    command: node core.cjs
    networks:
      - nova-bridge

  nova-relay:
    build: .
    container_name: nova-relay
    restart: always
    env_file: .env
    environment:
      - SOVEREIGN_SECRET=sovereign-secret-12345
    volumes:
      - ./.env:/app/.env
    command: node relay.cjs
    ports:
      - '3511:3511'
    networks:
      - nova-bridge

  nova-gateway:
    image: nginx:latest
    container_name: nova-gateway
    restart: always
    ports:
      - '3506:80'
    volumes:
      - ./nginx_clean.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nova-relay
    networks:
      - nova-bridge

networks:
  nova-bridge:
    driver: bridge
