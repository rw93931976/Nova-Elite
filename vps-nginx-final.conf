map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 🔄 HTTP -> HTTPS Redirect
server {
    listen 80;
    server_name nova.mysimpleaihelp.com api.mysimpleaihelp.com 31.220.59.237;
    return 301 https://$host$request_uri;
}

# 🔒 MAIN SOVEREIGN VHOST (Frontend + API)
server {
    listen 443 ssl;
    server_name nova.mysimpleaihelp.com api.mysimpleaihelp.com 31.220.59.237;

    ssl_certificate /etc/letsencrypt/live/nova.mysimpleaihelp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nova.mysimpleaihelp.com/privkey.pem;

    root /home/aims/nova/dist;
    index index.html;

    # 📡 SOVEREIGN RELAY (WebSocket Gateway)
    location /relay {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # 🔗 BRIDGE API (Health & Deep Discovery)
    location ~ ^/(health|api|deep-discovery|bridge-vps) {
        proxy_pass http://127.0.0.1:3505;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🖥️ FRONTEND (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public";
    }
}
