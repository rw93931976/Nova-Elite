name: Nova Sovereign Schooling

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  schooling:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allow pushing updates to syllabus/vault

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: "Intense Study & Notebook Sync"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SESSION_COOKIE: ${{ secrets.GOOGLE_SESSION_COOKIE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          node scripts/autonomous_schooling.cjs

      - name: "Commit & Push Progress"
        run: |
          git config --global user.name "Nova Sovereign"
          git config --global user.email "nova@elite-shielded.ai"
          git add SYLLABUS_DOCTORATE.md nova-data/library/solutions_vault.md
          git commit -m "🛸 [Sovereign Schooling] Cycle Complete (v9.5)" || echo "No changes to commit"
          git push
