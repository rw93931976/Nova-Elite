<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Architect Pulse</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #000000;
            --teal: #008080;
            --cyan: #00FFFF;
            --text: #E0E0E0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: var(--cyan);
            border-bottom: 2px solid var(--teal);
            padding-bottom: 10px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .message-list {
            margin-top: 20px;
        }

        .message {
            border: 1px solid var(--teal);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(0, 128, 128, 0.1);
            animation: fadeIn 0.5s ease-out;
        }

        .message.nova {
            border-left: 4px solid var(--cyan);
        }

        .message.arch {
            border-left: 4px solid #FFD700;
        }

        .meta {
            font-size: 0.8rem;
            color: var(--teal);
            margin-bottom: 5px;
        }

        .content {
            font-size: 1rem;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            background: #008080;
            color: #00FFFF;
            box-shadow: 0 0 10px var(--cyan);
        }
    </style>
</head>

<body>
    <div class="status-badge" id="syncStatus">SYNCING...</div>
    <h1>Sovereign Sync Layer</h1>
    <div class="message-list" id="list"></div>

    <script>
        const SUPABASE_URL = 'https://nqrtqfgbnwzsveemuyuu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xcnRxZmdibnd6c3ZlZW11eXV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4NzQ1MzksImV4cCI6MjA4NTQ1MDUzOX0.di_nb9liVxcG6fjncyyH43t1UEeQAGLRegKzWC0uVak';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchMessages() {
            const { data } = await supabase
                .from('agent_architect_comms')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(20);

            if (data) render(data);
        }

        function render(messages) {
            const list = document.getElementById('list');
            list.innerHTML = messages.map(m => `
                <div class="message ${m.sender === 'nova' ? 'nova' : 'arch'}">
                    <div class="meta">${m.created_at} | From: ${m.sender} | To: ${m.recipient}</div>
                    <div class="content">${m.message}</div>
                </div>
            `).join('');
        }

        // Realtime Subscription
        supabase.channel('sync-monitor')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'agent_architect_comms' }, (payload) => {
                const badge = document.getElementById('syncStatus');
                badge.innerText = 'Surge Detected!';
                badge.style.background = '#FFD700';
                badge.style.color = '#000';
                setTimeout(() => {
                    badge.innerText = 'SYNCING...';
                    badge.style.background = '#008080';
                    badge.style.color = '#00FFFF';
                }, 3000);
                fetchMessages();
            })
            .subscribe();

        fetchMessages();
    </script>
</body>

</html>
