server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name nova.mysimpleaihelp.com;

    location / {
        root /var/www/html/nova;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /relay {
        proxy_pass http://127.0.0.1:3506;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name nova.mysimpleaihelp.com;

    ssl_certificate /etc/letsencrypt/live/nova.mysimpleaihelp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nova.mysimpleaihelp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        root /var/www/html/nova;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /relay {
        proxy_pass http://127.0.0.1:3506;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
