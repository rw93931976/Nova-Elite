server {
    listen 80;
    server_name n8n.mysimpleaihelp.com api.mysimpleaihelp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name n8n.mysimpleaihelp.com api.mysimpleaihelp.com;

    ssl_certificate /etc/letsencrypt/live/n8n.mysimpleaihelp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.mysimpleaihelp.com/privkey.pem;

    # Relay endpoint — routes to the sovereign relay on port 3512
    location /relay {
        proxy_pass http://127.0.0.1:3512;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health and default — routes to nova-core on port 3505
    location / {
        proxy_pass http://127.0.0.1:3505;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
