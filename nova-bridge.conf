server {
    listen 443 ssl http2;
    server_name nova.mysimpleaihelp.com;

    ssl_certificate /etc/letsencrypt/live/nova.mysimpleaihelp.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nova.mysimpleaihelp.com-0001/privkey.pem;

    root /var/www/nova-bridge;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /relay {
        proxy_pass http://127.0.0.1:3505;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /health {
        proxy_pass http://127.0.0.1:3505/health;
    }
}

server {
    if ($host = nova.mysimpleaihelp.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name nova.mysimpleaihelp.com;
    return 404;
}
