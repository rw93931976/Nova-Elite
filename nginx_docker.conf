server {
    listen 80;
    server_name n8n.mysimpleaihelp.com api.mysimpleaihelp.com localhost;

    location / {
        return 200 "Sovereign Nova Gateway: Connected";
        add_header Content-Type text/plain;
    }

    location /relay {
        proxy_pass http://nova-relay:3511;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'Upgrade';
        proxy_set_header Host $host;
        proxy_buffering off;
    }
}
